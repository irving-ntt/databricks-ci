        # Task 4: Reverso de Movimientos (Final)
        - task_key: NB_PATRIF_REVMOV_0500_REV_MOVS
          depends_on:
            - task_key: NB_PATRIF_REVMOV_0300_ARCH_INGTY
              outcome: "success"
          notebook_task:
            notebook_path: "/Workspace/Users/irving_garcia7@outlook.com/databricks-ci/notebooks/NB_PATRIF_REVMOV_0500_REV_MOVS"
            base_parameters:
              p_SR_PROCESO: "{{job.parameters.p_SR_PROCESO}}"
              p_SR_SUBPROCESO: "{{job.parameters.p_SR_SUBPROCESO}}"
              p_SR_FOLIO: "{{job.parameters.p_SR_FOLIO}}"
