          notebook_task:
            notebook_path: "/Workspace/Users/irving_garcia7@outlook.com/databricks-ci/notebooks/NB_PATRIF_REVMOV_0300_ARCH_INGTY"
            base_parameters:
              p_SR_PROCESO: "{{job.parameters.p_SR_PROCESO}}"
              p_SR_SUBPROCESO: "{{job.parameters.p_SR_SUBPROCESO}}"
              p_SR_FOLIO: "{{job.parameters.p_SR_FOLIO}}"
              p_RUTA_TEMP: "{{job.parameters.p_RUTA_TEMP}}"
              p_RUTA_INTEGRITY: "{{job.parameters.p_RUTA_INTEGRITY}}"
              p_NOM_DATASET: "{{job.parameters.p_NOM_DATASET}}"
              p_TL_RESPUESTA_ITGY: "{{job.parameters.p_TL_RESPUESTA_ITGY}}"
              p_CVL_UNIDAD_NEGOCIO: "{{job.parameters.p_CVL_UNIDAD_NEGOCIO}}"
              p_CLV_SUFIJO_01: "{{job.parameters.p_CLV_SUFIJO_01}}"
              p_CLV_SUFIJO_02: "{{job.parameters.p_CLV_SUFIJO_02}}"
              p_CLV_SUFIJO_03: "{{job.parameters.p_CLV_SUFIJO_03}}"
              p_EXT_DS: "{{job.parameters.p_EXT_DS}}"
              p_EXT_DAT: "{{job.parameters.p_EXT_DAT}}"
              p_TL_MATRIZ_CONVIV: "{{job.parameters.p_TL_MATRIZ_CONVIV}}"
              p_MAP_NCI_ITGY: "{{job.parameters.p_MAP_NCI_ITGY}}"
