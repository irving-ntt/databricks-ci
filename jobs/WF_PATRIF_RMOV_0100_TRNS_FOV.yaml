              p_TL_PRE_MOVS: "{{job.parameters.p_TL_PRE_MOVS}}"
              p_NOM_DATASET: "{{job.parameters.p_NOM_DATASET}}"
              p_CVL_UNIDAD_NEGOCIO: "{{job.parameters.p_CVL_UNIDAD_NEGOCIO}}"
              p_CLV_SUFIJO_01: "{{job.parameters.p_CLV_SUFIJO_01}}"
              p_EXT_DS: "{{job.parameters.p_EXT_DS}}"
          existing_cluster_id: "{{cluster_id}}"
          timeout_seconds: 3600
          max_retries: 2
          retry_on_timeout: true
          libraries:
            - pypi:
                package: "pandas"
            - pypi:
                package: "pyspark"
      
      # Configuración de formato
      format: MULTI_TASK
