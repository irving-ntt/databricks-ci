name: PR Checks (CI + CodeQL gate)

permissions:
  contents: read

on:
  pull_request:
    branches: [ dev, main ]
  push:
    branches: [ dev, main ]

jobs:
  test:
    name: CI Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # ✅ necesario para que reviewdog anote en el PR
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with: { python-version: "3.10" }

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          else
            echo "No requirements.txt found. Skipping dependency install."
          fi
          python -m pip install pytest

      - name: Lint (flake8 annotations in PR)
        uses: reviewdog/action-flake8@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_on_error: true

      - name: Tests
        run: |
          set +e
          pytest -q --maxfail=1
          status=$?
          set -e

          if [ $status -eq 5 ]; then
            echo "No tests collected. Skipping pytest."
            exit 0
          fi

          exit $status

  codeql:
    name: CodeQL + Fail on High/Critical
    needs: test
    if: always()   # ✅ corre aunque falle "test"
    runs-on: ubuntu-latest
    permissions:
      actions: read
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze (SARIF output)
        uses: github/codeql-action/analyze@v3
        with:
          output: results.sarif

      - name: Locate SARIF file
        id: locate_sarif
        shell: bash
        run: |
          set -euo pipefail
          echo "Buscando archivos .sarif dentro de results.sarif..."
          SARIF_FILE="$(find results.sarif -type f -name '*.sarif' | head -n 1 || true)"

          if [[ -z "${SARIF_FILE}" ]]; then
            echo "ERROR: No se encontró ningún archivo .sarif dentro de results.sarif"
            echo "Contenido de results.sarif:"
            ls -la results.sarif || true
            exit 1
          fi

          echo "SARIF encontrado: ${SARIF_FILE}"
          echo "sarif_file=${SARIF_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Debug SARIF total findings (any severity)
        run: |
            python - << 'PY'
            import json
            f = "${{ steps.locate_sarif.outputs.sarif_file }}"
            d = json.load(open(f, "r", encoding="utf-8"))
            results = d.get("runs",[{}])[0].get("results",[])
            print("Total findings:", len(results))
            if results:
            print("Sample ruleId:", results[0].get("ruleId"))
            print("Sample message:", results[0].get("message", {}).get("text", ""))
            PY

      - name: Fail on High/Critical
        run: |
          python scripts/parse_sarif_fail_on_severity.py "${{ steps.locate_sarif.outputs.sarif_file }}" MEDIUM

  gate:
    name: Final Gate (Quality must pass)
    runs-on: ubuntu-latest
    needs: [ test, codeql ]
    if: always()   # ✅ corre siempre para decidir el resultado final
    steps:
      - name: Fail if CI Tests failed
        if: needs.test.result != 'success'
        run: |
          echo "CI Tests (Lint/Tests) failed. Failing workflow."
          exit 1

      - name: Fail if CodeQL failed
        if: needs.codeql.result != 'success'
        run: |
          echo "CodeQL job failed. Failing workflow."
          exit 1
