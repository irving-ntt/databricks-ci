name: PR Checks (CI + CodeQL gate)

permissions:
  contents: read

on:
  pull_request:
    branches: [ dev, main ]

jobs:
  test:
    name: CI Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with: { python-version: "3.10" }

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          else
            echo "No requirements.txt found. Skipping dependency install."
          fi
          python -m pip install pytest

      - name: Lint (flake8 annotations in PR)
        uses: reviewdog/action-flake8@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_on_error: true

      - name: Tests
        run: |
          set +e
          pytest -q --maxfail=1
          status=$?
          set -e

          if [ $status -eq 5 ]; then
            echo "No tests collected. Skipping pytest."
            exit 0
          fi

          exit $status

  codeql:
    name: CodeQL + Fail on High/Critical
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      # We intentionally do not set an explicit `output:` path here.
      # Leaving the default lets `github/codeql-action/analyze@v3` upload
      # the generated SARIF directly to GitHub Code Scanning so alerts
      # are created automatically on the PR. Previously we wrote SARIF
      # to a local file and did not upload it, which prevented alerts.
      - name: Analyze (upload SARIF)
        uses: github/codeql-action/analyze@v3

  gate:
    name: Final Gate (Quality must pass)
    runs-on: ubuntu-latest
    needs: [ test, codeql ]
    if: always()
    steps:
      - name: Fail if CI Tests failed
        if: needs.test.result != 'success'
        run: |
          echo "CI Tests (Lint/Tests) failed. Failing workflow."
          exit 1

      - name: Fail if CodeQL failed
        if: needs.codeql.result != 'success'
        run: |
          echo "CodeQL job failed. Failing workflow."
          exit 1
