name: Dynamic Databricks Notebook Deploy
on:
  push:
    branches: [ dev, main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    env:
      NOTEBOOKS_DIR: notebooks
      WORKSPACE_BASE: /Workspace/Users/irving_garcia7@outlook.com/databricks-ci/

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    
    - name: Install Databricks CLI
      run: |
        python -m pip install --upgrade pip
        python -m pip install databricks-cli pyyaml requests

    - name: Show deployment context
      run: |
          echo "Branch: ${GITHUB_REF_NAME}"
          echo "Environment DBX_ENV: ${{ secrets.DBX_ENV }}"
    
    - name: Configure Databricks CLI
      run: |
          printf "[DEFAULT]\nhost = ${{ secrets.DATABRICKS_HOST }}\ntoken = ${{ secrets.DATABRICKS_TOKEN }}\n" > ~/.databrickscfg

    - name: Import all notebooks
      run: |
          databricks workspace import_dir --overwrite $NOTEBOOKS_DIR $WORKSPACE_BASE/notebooks

    
    - name: Get existing cluster ID
      run: |
        DEST_HOST=${{ secrets.DATABRICKS_HOST }}
        DEST_TOKEN=${{ secrets.DATABRICKS_TOKEN }}
        CLUSTER_NAME=${{ secrets.DATABRICKS_CLUSTER_NAME }}
        
        echo "Buscando cluster existente: $CLUSTER_NAME"
        
        # Obtener lista de clusters
        clusters_response=$(curl -s -X GET \
          -H "Authorization: Bearer $DEST_TOKEN" \
          "$DEST_HOST/api/2.0/clusters/list")
        
        echo "Clusters response: $clusters_response"
        
        # Extraer cluster_id del cluster especificado
        cluster_id=$(echo "$clusters_response" | jq -r --arg name "$CLUSTER_NAME" '.clusters[]? | select(.cluster_name == $name) | .cluster_id')
        
        if [ "$cluster_id" != "" ] && [ "$cluster_id" != "null" ]; then
          echo "Cluster encontrado: $CLUSTER_NAME con ID: $cluster_id"
          echo "CLUSTER_ID=$cluster_id" >> $GITHUB_ENV
        else
          echo "No se encontró el cluster: $CLUSTER_NAME"
          echo "Clusters disponibles:"
          echo "$clusters_response" | jq -r '.clusters[]? | .cluster_name'
          exit 1
        fi

    - name: Generate deployment.yml
      run: |
          python scripts/generate_deployment_conf.py

    - name: Resolve cluster and patch jobs
      env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_CLUSTER_NAME: ${{ secrets.DATABRICKS_CLUSTER_NAME }}
          CLUSTER_ID: ${{ env.CLUSTER_ID }}
      run: |
          python scripts/resolve_and_patch_jobs.py

    - name: Deploy all jobs (robust, debug)
      env:
        DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
        DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      run: |
        set -euo pipefail
        echo "::group::Deploy all jobs - start"
        echo "Datetime: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
        echo "Workspace host: $DATABRICKS_HOST"
        echo "Listing job files in repo:"
        ls -la jobs || true

        echo "Configuring Jobs API to 2.1 (best-effort)"
        databricks jobs configure --version=2.1 || true

        find_job_id_by_name() {
          local name="$1"
          local page_token=""
          while :; do
            if [ -z "$page_token" ]; then
              resp=$(curl -sS -X GET -H "Authorization: Bearer $DATABRICKS_TOKEN" "$DATABRICKS_HOST/api/2.1/jobs/list")
            else
              resp=$(curl -sS -X GET -H "Authorization: Bearer $DATABRICKS_TOKEN" "$DATABRICKS_HOST/api/2.1/jobs/list?page_token=$page_token")
            fi

            if [ -z "$resp" ] || [ "$resp" = "null" ]; then
              break
            fi

            job_id=$(echo "$resp" | jq -r --arg NAME "$name" '.jobs[]? | select(.settings.name == $NAME) | .job_id' | head -n1 || true)
            if [ -n "$job_id" ] && [ "$job_id" != "null" ]; then
              echo "$job_id"
              return 0
            fi

            page_token=$(echo "$resp" | jq -r '.next_page_token // empty' || true)
            if [ -z "$page_token" ]; then
              break
            fi
          done
          return 1
        }

        shopt -s nullglob
        for file in jobs/*.yml jobs/*.yaml; do
          echo "---- Processing file: $file ----"
          TMP_JSON="$(mktemp)"

          python - "$file" "$TMP_JSON" <<'PY'
        import sys, yaml, json, traceback

        p = sys.argv[1]
        out = sys.argv[2]

        try:
            raw = yaml.safe_load(open(p, encoding='utf-8')) or {}
            job_obj = None
            job_name = None

            # CASE 1: direct job yaml (root name)
            if isinstance(raw, dict) and raw.get("name"):
                job_obj = raw
                job_name = raw.get("name")

            # CASE 2: databricks export (resources.jobs.<key>)
            elif isinstance(raw, dict) and isinstance(raw.get("resources"), dict):
                jobs_section = raw["resources"].get("jobs") or {}
                if isinstance(jobs_section, dict) and len(jobs_section) >= 1:
                    # prefer one that has 'name'
                    for _, v in jobs_section.items():
                        if isinstance(v, dict) and v.get("name"):
                            job_obj = v
                            job_name = v.get("name")
                            break
                    if job_obj is None:
                        first_key = next(iter(jobs_section))
                        job_obj = jobs_section[first_key]
                        job_name = job_obj.get("name") or (job_obj.get("settings") or {}).get("name")

            # CASE 3: jobs list (rare)
            elif isinstance(raw, dict) and isinstance(raw.get("jobs"), list) and raw["jobs"]:
                job_obj = raw["jobs"][0]
                job_name = job_obj.get("name") or (job_obj.get("settings") or {}).get("name")

            # final fallback
            if job_obj is None:
                job_obj = raw
                job_name = job_obj.get("name") or (job_obj.get("settings") or {}).get("name")

            if not job_name:
                print("DEBUG: Unable to determine job name from file:", p, file=sys.stderr)
                print("DEBUG: Top-level keys:", list(raw.keys()) if isinstance(raw, dict) else type(raw), file=sys.stderr)
                raise SystemExit(2)

            json.dump(job_obj, open(out, "w", encoding="utf-8"), indent=2)
            print("WROTE_JSON", out)
            print("JOB_NAME", job_name)

        except SystemExit:
            raise
        except Exception:
            traceback.print_exc()
            raise
        PY

              # ✅ SAFE: read job name without heredoc
              JOB_NAME=$(python -c "import json,sys; d=json.load(open(sys.argv[1],encoding='utf-8')); print(d.get('name') or (d.get('settings') or {}).get('name') or '')" "$TMP_JSON")

              if [ -z "$JOB_NAME" ] || [ "$JOB_NAME" = "null" ]; then
                echo "::error::Could not determine JOB_NAME for $file; check file format"
                rm -f "$TMP_JSON"
                exit 1
              fi

              echo "Resolved job name: $JOB_NAME"

              EXISTING_JOB_ID=$(find_job_id_by_name "$JOB_NAME" || true)

              if [ -z "$EXISTING_JOB_ID" ]; then
                echo "Creating job $JOB_NAME from $file"
                databricks jobs create --json-file "$TMP_JSON"
              else
                echo "Resetting (updating) job $JOB_NAME (ID: $EXISTING_JOB_ID) from $file"
                databricks jobs reset --job-id "$EXISTING_JOB_ID" --json-file "$TMP_JSON"
              fi

              rm -f "$TMP_JSON"
            done

            echo "::endgroup::Deploy all jobs - end"